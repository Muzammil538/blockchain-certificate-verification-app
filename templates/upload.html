{% extends "base.html" %}

{% block content %}
<h2>Upload Certificate</h2>
<p>Fill out the form below to upload a certificate to the blockchain.</p>

<form method="POST" enctype="multipart/form-data" class="mt-4">
    <div class="mb-3">
        <label for="name" class="form-label">Certificate Name</label>
        <input type="text" class="form-control" id="name" name="name" required>
    </div>
    
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="issued_to" class="form-label">Issued To</label>
            <input type="text" class="form-control" id="issued_to" name="issued_to" required>
        </div>
        <div class="col-md-6 mb-3">
            <label for="issued_by" class="form-label">Issued By</label>
            <input type="text" class="form-control" id="issued_by" name="issued_by" required>
        </div>
    </div>
    
    <div class="row">
        <div class="col-md-6 mb-3">
            <label for="issue_date" class="form-label">Issue Date</label>
            <input type="date" class="form-control" id="issue_date" name="issue_date" required>
        </div>
        <div class="col-md-6 mb-3">
            <label for="course" class="form-label">Course/Program</label>
            <input type="text" class="form-control" id="course" name="course">
        </div>
    </div>
    
    <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" name="description" rows="3"></textarea>
    </div>
    
    <div class="mb-3">
        <label for="file" class="form-label">Certificate File</label>
        <input class="form-control" type="file" id="file" name="file" required>
        <div class="form-text">Supported formats: PDF, PNG, JPG, DOC, DOCX</div>
    </div>
    
    <button type="submit" class="btn btn-primary">Upload to Blockchain</button>
</form>
{% endblock %}
